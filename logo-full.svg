<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <!-- Background -->
  <rect width="400" height="500" fill="#0a0a0a"/>

  <!-- Heart outline -->
  <path d="M200 130
           C200 130 130 80 100 100
           C60 125 60 175 100 210
           L200 310
           L300 210
           C340 175 340 125 300 100
           C270 80 200 130 200 130 Z"
        stroke="white" stroke-width="10" fill="none"/>

  <!-- Open Book (Quran) at bottom of heart -->
  <g transform="translate(200, 255)">
    <!-- Left page -->
    <path d="M0,0 L-70,-35 L-80,30 L0,40 Z" fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M0,0 L70,-35 L80,30 L0,40 Z" fill="white" opacity="0.95"/>
    <!-- Spine -->
    <line x1="0" y1="-5" x2="0" y2="42" stroke="#0a0a0a" stroke-width="3"/>
    <!-- Left page lines -->
    <line x1="-55" y1="-20" x2="-15" y2="-10" stroke="#0a0a0a" stroke-width="1.5" opacity="0.4"/>
    <line x1="-58" y1="-8" x2="-12" y2="2" stroke="#0a0a0a" stroke-width="1.5" opacity="0.4"/>
    <line x1="-60" y1="4" x2="-10" y2="14" stroke="#0a0a0a" stroke-width="1.5" opacity="0.4"/>
    <!-- Right page lines -->
    <line x1="55" y1="-20" x2="15" y2="-10" stroke="#0a0a0a" stroke-width="1.5" opacity="0.4"/>
    <line x1="58" y1="-8" x2="12" y2="2" stroke="#0a0a0a" stroke-width="1.5" opacity="0.4"/>
    <line x1="60" y1="4" x2="10" y2="14" stroke="#0a0a0a" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Three children figures inside heart, arms raised -->
  <!-- Left child -->
  <g transform="translate(155, 185)">
    <circle cx="0" cy="-38" r="10" fill="white"/>
    <path d="M0,-28 L0,10" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,-18 L-22,-8" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M0,10 L-12,30" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M0,10 L12,30" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Center child (tallest) -->
  <g transform="translate(200, 175)">
    <circle cx="0" cy="-42" r="12" fill="white"/>
    <path d="M0,-30 L0,15" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <path d="M0,-15 L-26,-2" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,-15 L26,-2" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,15 L-14,38" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,15 L14,38" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- Right child -->
  <g transform="translate(245, 185)">
    <circle cx="0" cy="-38" r="10" fill="white"/>
    <path d="M0,-28 L0,10" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,-18 L22,-8" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M0,10 L-12,30" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M0,10 L12,30" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- SHARIFA text -->
  <text x="200" y="370"
        font-family="Manrope, Arial, sans-serif"
        font-size="54"
        font-weight="700"
        letter-spacing="8"
        text-anchor="middle"
        fill="white">SHARIFA</text>

  <!-- Subtitle -->
  <text x="200" y="415"
        font-family="Manrope, Arial, sans-serif"
        font-size="16"
        font-weight="600"
        letter-spacing="3"
        text-anchor="middle"
        fill="white">ДЕТСКАЯ ШКОЛА КОРАНА</text>
</svg>
